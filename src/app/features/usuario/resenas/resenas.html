<div class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">
                <h1 class="m-0">Mis reseñas</h1>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3 class="card-title">Historial de los libros que has valorado.</h3>
    </div>

    <div class="card-body">
        <table class="table table-bordered table-hover align-middle">
            <thead>
            <tr>
                <th>Título del Libro</th>
                <th style="width: 180px;" class="text-center">Mi Calificación</th>
                <th style="width: 150px;" class="text-center">Acciones</th>
            </tr>
            </thead>
            <tbody>
                @for(item of resenas(); track item.id_resena) {
                    <tr>
                        <td class="align-middle"><strong>{{ item.libro?.titulo }}</strong></td>
                        <td class="text-center align-middle text-warning" style="letter-spacing: 2px;">
                            {{ convertirEstrellas(item.rating) }}
                        </td>
                        <td class="text-center align-middle">
                            <button class="btn btn-info btn-sm" [routerLink]="['/dashboard/galeria', item.libro?.id_libro]">
                                <i class="fas fa-eye"></i> Ver reseña
                            </button>
                        </td>
                    </tr>
                }
                @empty {
                    <tr>
                        <td colspan="3" class="text-center text-muted py-4">
                            <i class="fas fa-comment-slash fa-2x mb-2 d-block"></i>
                            Aún no has calificado ningún libro. ¡Ve a la galería y comparte tu opinión!
                        </td>
                    </tr>
                }
            </tbody>
        </table>
    </div>
</div>
