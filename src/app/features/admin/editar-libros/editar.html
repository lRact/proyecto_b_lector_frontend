<div class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">
                <h1 class="m-0">Editar libros</h1>
            </div>
        </div>
    </div>
</div>
<div class="card card-primary">
    <div class="card-header">
        <h3 class="card-title">Edita un libro ya existente.</h3>
    </div>

    <form [formGroup]="libroForm" (ngSubmit)="onSubmit()">
        <div class="card-body">
            <div class="row">
                <div class="form-group col">
                    <label for="titulo">Titulo</label>
                    <input type="text" class="form-control" id="titulo" formControlName="titulo">
                </div>

                <div class="form-group col">
                    <label for="autores">Autores</label>
                    <input type="text" class="form-control" id="autores" formControlName="autores">
                </div>
            </div>

            <div class="row">
                <div class="form-group col">
                    <label for="editor">Editor</label>
                    <input type="text" class="form-control" id="editor" formControlName="editor">
                </div>

                <div class="form-group col">
                    <label for="generos">Generos</label>
                    <input type="text" class="form-control" id="generos" formControlName="generos">
                </div>
            </div>

            <div class="row">
                <div class="form-group col">
                    <label>Sinopsis</label>
                    <textarea class="form-control" formControlName="sinopsis" style="max-height: 25vh; min-height: 10vh"></textarea>
                </div>

                <div class="form-group col">
                    <label for="portada">Portada</label>
                    <div class="input-group">
                        <div class="custom-file">
                            <input type="file" class="custom-file-input" id="portada" (change)="onFileChange($event)">
                            <label class="custom-file-label" for="portada">Archivos admitidos: png, jpg, jpeg.</label>
                        </div>
                    </div>
                </div>
            </div>

            @if(message()) {
                <div class="row">
                    <div class="alert alert-danger mb-3">{{ message() }}</div>
                </div>
            }
        </div>

        <div class="card-footer">
            <button type="submit" class="btn btn-primary" style="margin-right: 10px">Editar</button>
            <button type="submit" class="btn btn-danger" routerLink="/dashboard/gestion">Cancelar</button>
        </div>
    </form>
</div>
