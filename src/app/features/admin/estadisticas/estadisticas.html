<div class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">
                <h1 class="m-0">Estadísticas</h1>
            </div>
        </div>
    </div>
</div>
<div class="row">
    <div class="col-lg-4 col-6">
        <div class="small-box bg-info">
            <div class="inner">
                <h3>{{ totalUsuarios() }}</h3>
                <p>Lectores</p>
            </div>
        </div>
    </div>

    <div class="col-lg-4 col-6">
        <div class="small-box bg-success">
            <div class="inner">
                <h3>{{ totalLibros() }}</h3>
                <p>Libros</p>
            </div>
            <div class="icon">
                <i class="ion ion-stats-bars"></i>
            </div>
            <a routerLink="/dashboard/gestion" class="small-box-footer">Gestionar Libros</a>
        </div>
    </div>

    <div class="col-lg-4 col-6">
        <div class="small-box bg-warning">
            <div class="inner">
                <h3>{{ promedioRating() }}</h3>
                <p>Promedio de rating</p>
            </div>
        </div>
    </div>
</div>
