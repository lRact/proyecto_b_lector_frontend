<div class="login-page dark-mode" style="min-height: 100vh;">
  <div class="login-box">
    <div class="login-logo">
      <b>Burrito Lector</b>
    </div>

    <div class="card card-outline card-primary">
      <div class="card-header text-center">
        <h3 class="card-title float-none">Bienvenido</h3>
      </div>
      <div class="card-body">
        <p class="login-box-msg">Crea una cuenta para continuar</p>

        <form id="quickForm">
          <label class="form-text" for="nombre">Nombre</label>
          <div class="input-group mb-3">
            <input type="text" name="nombre" class="form-control" id="nombre" [(ngModel)]="nombre">
          </div>

          <label class="form-text" for="email">Correo</label>
          <div class="input-group mb-3">
            <input type="email" name="email" class="form-control" id="email" [(ngModel)]="email">
          </div>

          <label class="form-text" for="password">Contraseña</label>
          <div class="input-group mb-3">
            <input type="password" name="password" class="form-control" id="password" [(ngModel)]="password">
          </div>

          <label class="form-text" for="confirmPassword">Confirmar contraseña</label>
          <div class="input-group mb-3">
            <input type="password" name="confirmPassword" class="form-control" id="confirmPassword" [(ngModel)]="confirmPassword">
          </div>

          @if(message()) {
            <div class="alert alert-danger mb-3">{{ message() }}</div>
          }

          <div class="row mt-4">
            <div class="col-12">
              <button type="submit" class="btn btn-primary btn-block" (click)="onSubmit()">Crear cuenta</button>
            </div>
          </div>
        </form>

        <div class="card-footer row mt-3">
          <div class="col-12">
            ¿Ya tienes una cuenta? <a routerLink="/login">Inicia sesión</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
